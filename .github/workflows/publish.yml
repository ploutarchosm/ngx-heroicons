# .github/workflows/publish.yml
name: Publish to NPM

# Triggers when you push a semver tag (e.g. v1.2.3), or run it manually.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance (supply-chain attestation)

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Optional but recommended: fail fast if the build is broken
      - name: Build library
        run: npx ng build ngx-heroicons --configuration production

      # ng-packagr emits the publishable package to dist/YOUR_LIBRARY_NAME
      - name: Publish to NPM
        run: npm publish --provenance --access public
        working-directory: dist/ngx-heroicons
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}